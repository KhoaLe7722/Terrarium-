  <div class="page-header">
    <h1>Tất cả sản phẩm</h1>
    <div class="breadcrumb">
      <a href="../trangchu/index.html">Trang chủ</a> &gt;
      <span>Tất cả sản phẩm</span>
    </div>
  </div>


  <!-- ===== MAIN CONTENT ===== -->
  <main class="container">
    <div class="grid-layout">

      <!-- Loc san pham -->
      <aside class="sidebar filter-sidebar">
        <h3 class="aside-titles">Lọc sản phẩm</h3>
        <div class="filter-group">
          <ul>
            <li class="filter-item">
              <label><input type="checkbox"> Giá dưới 100.000đ</label>
            </li>
            <li class="filter-item">
              <label><input type="checkbox"> 100.000đ - 200.000đ</label>
            </li>
            <li class="filter-item">
              <label><input type="checkbox"> 200.000đ - 300.000đ</label>
            </li>
            <li class="filter-item">
              <label><input type="checkbox"> 300.000đ - 500.000đ</label>
            </li>
            <li class="filter-item">
              <label><input type="checkbox"> 500.000đ - 1.000.000đ</label>
            </li>
            <li class="filter-item">
              <label><input type="checkbox"> Trên 1.000.000đ</label>
            </li>
          </ul>
        </div>
      </aside>

      <!-- San pham -->
      <section class="product-section">
        <div class="product-grid">
          <!-- Sản phẩm được thêm bằng JavaScript -->
        </div>
      </section>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer" id="site-footer"></footer>

  <script>
    const products = [
      {
        id: 1,
        name: "Terrarium Rêu Mini",
        price: 180000,
        image: "image_sanpham/1.jpg"
      },
      {
        id: 2,
        name: "Terrarium Lớn Sang Trọng",
        price: 320000,
        image: "../images/sp2.jpg"
      },
      {
        id: 3,
        name: "Bình Trang Trí Phong Cách Nhật",
        price: 250000,
        image: "../images/sp3.jpg"
      },
      {
        id: 4,
        name: "Combo Rêu + Phụ kiện",
        price: 480000,
        image: "../images/sp4.jpg"
      },
      {
        id: 5,
        name: "Terrarium Gỗ Tự Nhiên",
        price: 350000,
        image: "../images/sp5.jpg"
      }
    ];

    const grid = document.querySelector('.product-grid');
    grid.innerHTML = products.map(product => `
    <div class="product-card">
      <a href="spchitiet.html?id=${product.id}">
        <img src="${product.image}" alt="${product.name}">
        <h3>${product.name}</h3>
        <p class="price">${product.price.toLocaleString()}đ</p>
      </a>
    </div>
  `).join('');
  </script>

</body>
