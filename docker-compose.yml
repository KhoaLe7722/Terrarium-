services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-terrarium_db}
      DB_USERNAME: ${DB_USERNAME:-terrarium_user}
      DB_PASSWORD: ${DB_PASSWORD:-terrarium_pass}
      DB_ROOT_USERNAME: ${DB_ROOT_USERNAME:-root}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-terrarium_db}
      MYSQL_USER: ${DB_USERNAME:-terrarium_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-terrarium_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/terrarium_db.sql:/docker-entrypoint-initdb.d/01-terrarium_db.sql:ro
      - ./data/seed_demo_orders.sql:/docker-entrypoint-initdb.d/02-seed_demo_orders.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
